name: Atualizar Mapas do IPMA (Auto)

on:
  schedule:
    - cron: '0 6 * * *' # Corre todos os dias às 06:00
  workflow_dispatch:      # Permite correr manualmente

jobs:
  fotografar-mapas:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Configurar ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Instalar dependências de sistema (Fix para Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libx11-xcb1 libxcb-dri3-0 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxshmfence1 libgbm1 libasound2t64

      - name: 4. Instalar Python e Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 5. Executar Scraper
        run: python scraper_ipma.py

      - name: 6. Guardar imagens no Repositório
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Bot Operacional"
          git config --global user.email "bot@operacional.local"
          
          # 1. Puxa as suas alterações manuais (se existirem) para o robô antes de ele gravar
          git config pull.rebase true
          git pull origin main
          
          # 2. Adiciona as imagens geradas na raiz do repositório
          git add *.png
          
          # 3. Verifica se há novidades e envia
          if git diff --staged --quiet; then
            echo "As imagens não sofreram alterações ou não foram geradas. Nada a fazer."
          else
            git commit -m "Atualização automática: mapas IPMA e CAOP (_PE)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          fi
