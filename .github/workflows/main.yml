name: "Atualizar Mapas IPMA - Autogeração Local"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  generate-maps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências de Gráficos
        run: |
          pip install requests matplotlib

      - name: Descarregar Dados e Gerar Mapas Radiais
        run: |
          cat << 'EOF' > gerar_mapas.py
          import requests
          import matplotlib.pyplot as plt
          from datetime import datetime, timedelta

          # Palete de cores oficial do IPMA para o Risco de Incêndio Rural
          CORES_RISCO = {
              "1": "#90EE90",  # Reduzido (Verde claro)
              "2": "#FFFF66",  # Moderado (Amarelo)
              "3": "#F4A460",  # Elevado (Laranja)
              "4": "#DC6464",  # Muito Elevado (Vermelho)
              "5": "#8B5A69"   # Máximo (Roxo/Castanho)
          }

          for d in range(3):
              data_alvo = (datetime.now() + timedelta(days=d)).strftime("%Y-%m-%d")
              nome_ficheiro = "portugal_hoje.png" if d == 0 else "portugal_amanha.png" if d == 1 else "portugal_depois.png"
              
              # API pública de dados abertos do IPMA (Texto puro, 100% estável)
              url = f"https://api.ipma.pt/open-data/forecast/forecast/meteorology/rcm/rcm-d{d}.json"
              resposta = requests.get(url)
              
              if resposta.status_code == 200:
                  dados = resposta.json()
                  
                  # Criar uma figura simulando o mapa de Portugal
                  fig, ax = plt.subplots(figsize=(5, 10))
                  ax.set_facecolor('#F0F8FF') # Fundo azul suave (Oceano)
                  
                  # No JSON do IPMA, 'local' é um dicionário composto por id_concelho: dados_concelho
                  lista_locais = dados.get('local', {})
                  y_pos = 950
                  
                  # CORREÇÃO CRÍTICA: Percorre o dicionário extraindo os objetos internos corretamente
                  if isinstance(lista_locais, dict):
                      for id_concelho, dados_concelho in lista_locais.items():
                          if isinstance(dados_concelho, dict):
                              rcm_val = str(dados_concelho.get('rcm', 1))
                              cor = CORES_RISCO.get(rcm_val, "#FFFFFF")
                              
                              # Desenha uma barra horizontal estilizada
                              ax.fill_between([10, 90], y_pos, y_pos - 8, color=cor, edgecolor='none')
                              y_pos -= 10
                              if y_pos < 50: break
                  
                  ax.set_xlim(0, 100)
                  ax.set_ylim(0, 1000)
                  ax.axis('off')
                  
                  # Adiciona o título com a respetiva data
                  plt.title(f"RISCO INCÊNDIO - {data_alvo}", fontsize=14, fontweight='bold', pad=20)
                  plt.tight_layout()
                  plt.savefig(nome_ficheiro, dpi=100, facecolor=fig.get_facecolor(), edgecolor='none')
                  plt.close()
                  print(f"Mapa {nome_ficheiro} gerado localmente com sucesso.")
          EOF
          python gerar_mapas.py

      - name: Guardar imagens e enviar para o GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # Garante que adicionamos apenas as imagens geradas
          git add portugal_hoje.png portugal_amanha.png portugal_depois.png
          
          # Verifica se há alterações reais nos mapas antes de fazer o commit
          if git diff-index --quiet HEAD; then
            echo "Nenhuma alteração nos mapas hoje. O histórico mantém-se idêntico."
          else
            git commit -m "Gerar mapas de risco autónomos via API JSON (Bypass Completo)"
            
            # Sincroniza com o histórico do servidor antes do upload para evitar rejeições
            git pull --rebase origin main
            
            # Faz o envio definitivo para o repositório
            git push origin main
          fi
