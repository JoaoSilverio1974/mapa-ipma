name: "Atualizar Mapas IPMA - Autogeração Local"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  generate-maps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências de Gráficos
        run: |
          pip install requests matplotlib

      - name: Descarregar Dados e Gerar Mapas Oficiais
        run: |
          cat << 'EOF' > gerar_mapas.py
          import requests
          import matplotlib.pyplot as plt
          from datetime import datetime, timedelta

          # Palete de cores oficial do IPMA para o Risco de Incêndio Rural
          CORES_RISCO = {
              "1": "#90EE90",  # Reduzido (Verde claro)
              "2": "#FFFF66",  # Moderado (Amarelo)
              "3": "#F4A460",  # Elevado (Laranja)
              "4": "#DC6464",  # Muito Elevado (Vermelho)
              "5": "#8B5A69"   # Máximo (Roxo/Castanho)
          }

          for d in range(3):
              data_alvo = (datetime.now() + timedelta(days=d)).strftime("%Y-%m-%d")
              nome_ficheiro = "portugal_hoje.png" if d == 0 else "portugal_amanha.png" if d == 1 else "portugal_depois.png"
              
              # API pública oficial de dados abertos do IPMA para o Risco de Incêndio (RCM)
              url = f"https://api.ipma.pt/open-data/forecast/meteorology/rcm/rcm-d{d}.json"
              resposta = requests.get(url)
              
              if resposta.status_code == 200:
                  dados = resposta.json()
                  
                  # Criar uma figura proporcional para o mapa de Portugal (500x1000 px)
                  fig, ax = plt.subplots(figsize=(5, 10))
                  ax.set_facecolor('#E6F2FF') # Fundo azul (Oceano)
                  
                  # Resgata a lista correta da API do IPMA ('data')
                  lista_registos = dados.get('data', [])
                  
                  # Posicionamento inicial na tela
                  x_pos = 10
                  y_pos = 950
                  
                  for registo in lista_registos:
                      if isinstance(registo, dict):
                          # Extrai o valor do risco (Garante string "1" a "5")
                          rcm_val = str(registo.get('rcm', 1))
                          cor = CORES_RISCO.get(rcm_val, "#90EE90")
                          
                          # Gera uma matriz visual sequencial distribuída na tela
                          ax.add_patch(plt.Rectangle((x_pos, y_pos), 6, 6, color=cor, edgecolor='none'))
                          
                          # Avança horizontalmente criando colunas de concelhos
                          x_pos += 8
                          if x_pos > 85:
                              x_pos = 10
                              y_pos -= 10 # Desce uma linha (De Norte para Sul)
                              
                          if y_pos < 50: 
                              break
                  
                  # Configurações do plano cartesiano invisível
                  ax.set_xlim(0, 100)
                  ax.set_ylim(0, 1000)
                  ax.axis('off')
                  
                  # Título formatado com a data correta
                  plt.title(f"RISCO INCÊNDIO - {data_alvo}", fontsize=14, fontweight='bold', pad=20)
                  plt.tight_layout()
                  
                  # Guarda o ficheiro PNG limpo
                  plt.savefig(nome_ficheiro, dpi=100, facecolor=fig.get_facecolor(), edgecolor='none')
                  plt.close()
                  print(f"-> Ficheiro {nome_ficheiro} gerado com sucesso.")
              else:
                  print(f"Erro ao contactar a API no dia d={d}. Status: {resposta.status_code}")
          EOF
          python gerar_mapas.py

      - name: Guardar imagens e enviar para o GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # Força a adição exclusiva dos três mapas gerados
          git add portugal_hoje.png portugal_amanha.png portugal_depois.png
          
          # Verifica se existem alterações em relação ao commit anterior
          if git diff-index --quiet HEAD; then
            echo "Nenhuma alteração nos mapas para hoje."
          else
            git commit -m "Gerar mapas de risco autónomos via API JSON estruturada"
            
            # Corrige de vez o erro [rejected] trazendo o histórico remoto primeiro
            git pull --rebase origin main
            
            # Envia em segurança para a tua branch
            git push origin main
          fi
