name: "Atualizar Mapas IPMA - Versao Estavel"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  generate-maps:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências de Gráficos
        run: |
          pip install requests matplotlib

      - name: Descarregar Dados e Gerar Mapas Oficiais
        run: |
          # Elimina ficheiros antigos para limpar o ambiente do GitHub
          rm -f gerar_mapas.py
          rm -f desenhar_portugal.py
          
          cat << 'EOF' > desenhar_portugal.py
          import requests
          import matplotlib.pyplot as plt
          from datetime import datetime, timedelta

          # Palete de cores oficial do IPMA para o Risco de Incêndio Rural
          CORES_RISCO = {
              "1": "#90EE90",  # Reduzido (Verde claro)
              "2": "#FFFF66",  # Moderado (Amarelo)
              "3": "#F4A460",  # Elevado (Laranja)
              "4": "#DC6464",  # Muito Elevado (Vermelho)
              "5": "#8B5A69"   # Máximo (Roxo)
          }

          for d in range(3):
              data_alvo = (datetime.now() + timedelta(days=d)).strftime("%Y-%m-%d")
              nome_ficheiro = "portugal_hoje.png" if d == 0 else "portugal_amanha.png" if d == 1 else "portugal_depois.png"
              
              # API pública alternativa do IPMA em formato TXT (Chave globalIdLocal e RCM direta por linha)
              url = f"https://api.ipma.pt/open-data/forecast/forecast/meteorology/rcm/rcm-d{d}.txt"
              resposta = requests.get(url)
              
              if resposta.status_code == 200:
                  linhas = resposta.text.splitlines()
                  
                  # Criar uma figura proporcional para o mapa de Portugal (500x1000 px)
                  fig, ax = plt.subplots(figsize=(5, 10))
                  ax.set_facecolor('#E6F2FF') # Oceano
                  
                  x_pos = 10
                  y_pos = 950
                  
                  for linha in linhas:
                      # Ignora cabeçalhos ou linhas vazias do ficheiro de texto
                      if "," in linha and not linha.startswith("globalIdLocal"):
                          partes = linha.split(",")
                          if len(partes) >= 2:
                              rcm_val = str(partes[1]).strip()
                              cor = CORES_RISCO.get(rcm_val, "#90EE90")
                              
                              # Desenha o bloco colorido na grelha cartesiana
                              ax.add_patch(plt.Rectangle((x_pos, y_pos), 6, 6, color=cor, edgecolor='none'))
                              
                              x_pos += 8
                              if x_pos > 85:
                                  x_pos = 10
                                  y_pos -= 10 # Desce de Norte para Sul
                                  
                              if y_pos < 50: 
                                  break
                  
                  ax.set_xlim(0, 100)
                  ax.set_ylim(0, 1000)
                  ax.axis('off')
                  
                  plt.title(f"RISCO INCÊNDIO - {data_alvo}", fontsize=14, fontweight='bold', pad=20)
                  plt.tight_layout()
                  plt.savefig(nome_ficheiro, dpi=100, facecolor=fig.get_facecolor(), edgecolor='none')
                  plt.close()
                  print(f"-> Ficheiro {nome_ficheiro} gerado com sucesso via TXT.")
          EOF
          python desenhar_portugal.py

      - name: Guardar imagens e enviar para o GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          git add portugal_hoje.png portugal_amanha.png portugal_depois.png
          
          if git diff-index --quiet HEAD; then
            echo "Nenhuma alteração nos mapas hoje."
          else
            git commit -m "Gerar mapas de risco via API de Texto Limpo"
            git pull --rebase origin main
            git push origin main
          fi
