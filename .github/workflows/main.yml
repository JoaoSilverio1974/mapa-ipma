name: "Atualizar Mapas IPMA - Portugal Completo"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  update-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Calcular datas e sacar mapas completos
        run: |
          # Calcula as datas dinamicamente (Garante fuso horário de Portugal/Lisboa)
          TZ="Europe/Lisbon"
          HOJE=$(date +%Y-%m-%d)
          AMANHA=$(date -d "+1 day" +%Y-%m-%d)
          DEPOIS=$(date -d "+2 days" +%Y-%m-%d)
          
          # URL BASE DO SERVIDOR DO IPMA (Sem parâmetros de tempo)
          URL="https://cs2.ipma.pt/azstats/wms?map=rcm-forecast_9p1d-continental-prevstat-idw&service=WMS&request=GetMap&layers=PT%3AIPMA%3ACDG%3ALAYER%3Arcm-forecast_9p1d-continental-prevstat-idw%3APIR%3ACONCELHOS&styles=&format=image%2Fpng&transparent=true&version=1.1.1&srs=EPSG%3A3857&width=500&height=1000&bbox=-1070000,4420000,-680000,5200000"

          # Cabeçalho de simulação (User-Agent) para contornar o bloqueio da Firewall do IPMA
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

          echo "A descarregar mapa de hoje (${HOJE})..."
          curl -s -H "User-Agent: $USER_AGENT" -o portugal_hoje.png "${URL}&time=${HOJE}T00:00:00Z"
          
          echo "A descarregar mapa de amanhã (${AMANHA})..."
          curl -s -H "User-Agent: $USER_AGENT" -o portugal_amanha.png "${URL}&time=${AMANHA}T00:00:00Z"
          
          echo "A descarregar mapa de depois (${DEPOIS})..."
          curl -s -H "User-Agent: $USER_AGENT" -o portugal_depois.png "${URL}&time=${DEPOIS}T00:00:00Z"

          # Validação de segurança: Verifica se os ficheiros descarregados são imagens válidas
          # Se o IPMA bloquear, o ficheiro não será um PNG válido e o script avisa no log
          file portugal_hoje.png
          ls -lh portugal_*.png

      - name: Guardar imagens e enviar para o GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          git add portugal_hoje.png portugal_amanha.png portugal_depois.png
          
          if git diff-index --quiet HEAD; then
            echo "Nenhuma alteração real nos mapas. O IPMA mantém os mesmos dados."
          else
            git commit -m "Atualizar mapas completos do IPMA (Bypass WAF)"
            git push
          fi
