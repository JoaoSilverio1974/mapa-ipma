name: Atualizar Mapas IPMA - Portugal Completo

on:
  schedule:
    - cron: '0 7 * * *' # Corre todos os dias às 7h
  workflow_dispatch:

jobs:
  update-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Calcular datas e sacar mapas completos
        run: |
          # Calcula as datas dinamicamente
          HOJE=$(date +%Y-%m-%d)
          AMANHA=$(date -d "+1 day" +%Y-%m-%d)
          DEPOIS=$(date -d "+2 days" +%Y-%m-%d)
          
          # O link mágico que pede o país inteiro em proporção 1:2 (500x1000 píxeis)
          URL="https://cs2.ipma.pt/azstats/wms?map=rcm-forecast_9p1d-continental-prevstat-idw&service=WMS&request=GetMap&layers=PT%3AIPMA%3ACDG%3ALAYER%3Arcm-forecast_9p1d-continental-prevstat-idw%3APIR%3ACONCELHOS&styles=&format=image%2Fpng&transparent=true&version=1.1.1&srs=EPSG%3A3857&width=500&height=1000&bbox=-1070000,4420000,-680000,5200000"

          # Faz o download das 3 imagens integrais
          curl -s -o portugal_hoje.png "${URL}&time=${HOJE}T00%3A00%3A00Z"
          curl -s -o portugal_amanha.png "${URL}&time=${AMANHA}T00%3A00%3A00Z"
          curl -s -o portugal_depois.png "${URL}&time=${DEPOIS}T00%3A00%3A00Z"

      - name: Guardar imagens e enviar para o GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add *.png
          git commit -m "Atualizar mapas completos do IPMA" || echo "Sem alterações"
          git push
