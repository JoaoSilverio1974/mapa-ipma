name: "Atualizar Mapas IPMA - Portugal Completo"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  update-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Sacar Mapas Oficiais Prontos (Bypass Proxy/WMS)
        run: |
          # Links diretos das imagens de previsão diária que o IPMA gera no servidor público principal
          # Isto são ficheiros estáveis e não passam pelo Geoserver/MapServer
          
          echo "A descarregar mapa de Hoje..."
          curl -s -L -o portugal_hoje.png "https://www.ipma.pt/resources.www/images/meteorologia/rcm/rcm_hoje_idw.png"
          
          echo "A descarregar mapa de Amanhã..."
          curl -s -L -o portugal_amanha.png "https://www.ipma.pt/resources.www/images/meteorologia/rcm/rcm_amanha_idw.png"
          
          echo "A descarregar mapa de Depois de Amanhã..."
          curl -s -L -o portugal_depois.png "https://www.ipma.pt/resources.www/images/meteorologia/rcm/rcm_depois_idw.png"

          # Validação no terminal do GitHub para verificar se os ficheiros são válidos
          file portugal_hoje.png
          ls -lh portugal_*.png

      - name: Guardar imagens e enviar para o GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          git add portugal_hoje.png portugal_amanha.png portugal_depois.png
          
          if git diff-index --quiet HEAD; then
            echo "Nenhuma alteração nos mapas hoje."
          else
            git commit -m "Atualizar mapas estáticos do IPMA (Bypass Completo)"
            git push
          fi
