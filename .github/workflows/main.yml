name: Atualizar Mapas IPMA - Portugal Completo

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Esta linha resolve o aviso (Warning) do Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Calcular datas e sacar mapas completos
        run: |
          # Calcula as datas dinamicamente
          HOJE=$(date +%Y-%m-%d)
          AMANHA=$(date -d "+1 day" +%Y-%m-%d)
          DEPOIS=$(date -d "+2 days" +%Y-%m-%d)
          
          # URL INTEGRAL CORRIGIDO: Atualizado com o novo parâmetro do IPMA (rcm_2026)
          # Mantém as coordenadas corretas de Portugal Continental e o tamanho proporcional (500x1000)
          URL="https://cs2.ipma.pt/azstats/wms?map=rcm_2026-forecast_9p1d-continental-prevstat-idw&service=WMS&request=GetMap&layers=PT%3AIPMA%3ACDG%3ALAYER%3Arcm_2026-forecast_9p1d-continental-prevstat-idw%3APIR%3ACONCELHOS&styles=&format=image%2Fpng&transparent=true&version=1.1.1&srs=EPSG%3A3857&width=500&height=1000&bbox=-1070000,4420000,-680000,5200000"

          # Faz o download das 3 imagens integrais usando o novo URL
          curl -s -o portugal_hoje.png "${URL}&time=${HOJE}T00%3A00%3A00Z"
          curl -s -o portugal_amanha.png "${URL}&time=${AMANHA}T00%3A00%3A00Z"
          curl -s -o portugal_depois.png "${URL}&time=${DEPOIS}T00%3A00%3A00Z"

      - name: Guardar imagens e enviar para o GitHub
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          
          # Adiciona as imagens preparadas
          git add .
          
          # Verifica se os novos mapas são numericamente diferentes dos que já estavam guardados
          if git diff-index --quiet HEAD; then
            echo "Nenhuma alteração nos mapas hoje. O IPMA ainda não atualizou."
          else
            git commit -m "Atualizar mapas completos do IPMA"
            git push
          fi
